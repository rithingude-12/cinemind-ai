services:
  - type: web
    name: cinemind-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main_peak:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
    healthCheckPath: /api/v1/movies/search?q=test
    autoDeploy: true
